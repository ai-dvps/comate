name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-2022
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        id: build_tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Comate ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} ${{ env.TAURI_SIGNING_PRIVATE_KEY != '' && '--config src-tauri/updater-ci.json' || '' }}

      - name: Verify updater artifacts
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.build_tauri.outputs.releaseId }}
        run: |
          set -euo pipefail

          if ! find src-tauri/target -name '*.sig' -print -quit | grep -q .; then
            echo "Missing updater signatures"
            exit 1
          fi

          if [ ! -s latest.json ]; then
            echo "Missing local latest.json updater manifest"
            exit 1
          fi

          if [ -z "${RELEASE_ID}" ]; then
            echo "Missing release id from tauri-action"
            exit 1
          fi

          if ! gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --jq '.[].name' | grep -Fxq latest.json; then
            echo "Missing latest.json updater manifest release asset"
            exit 1
          fi

          echo "Updater artifacts present"
